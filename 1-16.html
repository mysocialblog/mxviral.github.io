<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  background: #000;
  height: 100%;
  font-family: Arial, sans-serif;
}

.container {
  position: relative;
  width: 100%;
  height: 80vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

video {
  height: 100%;
  max-width: 100%;
  background: #000;
}

/* BOTÓN VER VIDEO */
#playBtn {
  position: absolute;
  padding: 16px 30px;
  background: linear-gradient(135deg, #7b2ff7, #f107a3);
  color: #fff;
  border: none;
  border-radius: 14px;
  font-size: 18px;
  font-weight: bold;
  cursor: pointer;
  z-index: 10;
  box-shadow: 0 0 18px rgba(241,7,163,.5);
  transition: .3s ease;
}

#playBtn:hover {
  transform: scale(1.05);
}

/* BOTÓN VER MÁS */
#moreBtn {
  display: none;
  position: fixed;
  top: 15px;
  left: 50%;
  transform: translateX(-50%);
  padding: 10px 24px;
  font-size: 13px;
  font-weight: bold;
  border-radius: 25px;
  cursor: pointer;
  z-index: 9999;
  border: none;
  transition: .3s ease;
  background: linear-gradient(135deg, #00b09b, #96c93d);
  color: #fff;
  box-shadow: 0 0 15px rgba(150,201,61,.45);
}

#moreBtn:hover {
  transform: translateX(-50%) scale(1.05);
}

/* BOTÓN SIGUIENTE VIDEO */
#nextBtn {
  display: none;
  position: fixed;
  bottom: 18px;
  left: 50%;
  transform: translateX(-50%);
  padding: 14px 30px;
  border: none;
  border-radius: 40px;
  background: linear-gradient(135deg, #ff512f, #dd2476);
  color: #fff;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
  z-index: 9999;
  box-shadow:
    0 0 10px rgba(255,81,47,.8),
    0 0 25px rgba(221,36,118,.7);

  animation:
    pulse 1.2s infinite,
    blink 1s infinite;
}

/* EFECTO PULSO */
@keyframes pulse {
  0% {
    transform: translateX(-50%) scale(1);
  }

  50% {
    transform: translateX(-50%) scale(1.08);
  }

  100% {
    transform: translateX(-50%) scale(1);
  }
}

/* EFECTO PARPADEO */
@keyframes blink {
  0%, 100% {
    opacity: 1;
  }

  50% {
    opacity: .65;
  }
}

</style>
</head>

<body>

<div class="container">

  <video id="video" controls playsinline>
    <source src="https://cdn.videy.co/pVYSPSvH1.mp4" type="video/mp4">
  </video>

  <button id="playBtn">
    ▶ VER VIDEO
  </button>

</div>

<button id="moreBtn">
  👀 VER MÁS
</button>

<button id="nextBtn">
  🎬 SIGUIENTE VIDEO
</button>

<script>

const playBtn = document.getElementById('playBtn');
const video = document.getElementById('video');
const moreBtn = document.getElementById('moreBtn');
const nextBtn = document.getElementById('nextBtn');

let monetized = false;

/* PLAY */
playBtn.addEventListener('click', () => {

  playBtn.style.display = 'none';
  video.play();

  moreBtn.style.display = 'block';
  nextBtn.style.display = 'block';

  /* SOLO 1 POP */
  if (!monetized) {

    monetized = true;

    window.open(
      'https://oppositionconvenient.com/ezj5vkdd?key=cd1ff5e60dc989193238776a6e13973b&abt=o1',
      '_blank'
    );
  }

});

/* VER MÁS */
moreBtn.addEventListener('click', () => {

  window.open(
    'https://oppositionconvenient.com/ezj5vkdd?key=cd1ff5e60dc989193238776a6e13973b&abt=o1',
    '_blank'
  );

});

/* SIGUIENTE VIDEO */
nextBtn.addEventListener('click', () => {

  window.open(
    'https://sowve.com/ezj5vkdd?key=cd1ff5e60dc989193238776a6e13973b&abt=n1',
    '_blank'
  );

});

/* CUANDO TERMINA EL VIDEO */
video.addEventListener('ended', () => {

  window.open(
    'https://sowve.com/ezj5vkdd?key=cd1ff5e60dc989193238776a6e13973b&abt=n1',
    '_blank'
  );

});

</script>

</body>
</html>
